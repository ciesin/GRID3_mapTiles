services:
  martin:
    image: ghcr.io/maplibre/martin:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./config.yaml:/config.yaml:ro
      - ./styles:/styles:ro
      - /mnt/d/mheaton/grid3_tiles/data/3-pmtiles:/data:ro
    command: ["--config", "/config.yaml", "--webui", "enable-for-all"]
    environment:
      RUST_LOG: "martin=info,actix_web=warn"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      martin:
        condition: service_healthy
