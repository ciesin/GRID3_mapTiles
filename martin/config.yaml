---
# Martin tileserver configuration v1.11.0
# Serves PMTiles archives synced locally from Cloudflare R2.
# Source IDs match the keys in pmtiles/app/src/sources.ts.
#
# Run:  make start   (from the martin/ directory)
# Sync: make sync    (pull latest PMTiles from R2 first)

listen_addresses: "0.0.0.0:3000"

cache:
  size_mb: 512

# Allow all origins (ArcGIS Pro desktop + local MapLibre viewer)
cors: true

# Warn on missing files instead of aborting startup
on_invalid: warn

# gzip is universally supported by ArcGIS Pro; brotli is not
preferred_encoding: gzip

# ArcGIS Pro cannot consume MLT format
convert_to_mlt: disabled

styles:
  rendering: true
  sources:
    ciesin_qgis_style: /styles/style-qgis.json


pmtiles:
  sources:
    # ── Base layers ────────────────────────────────────────────────────────
    protomaps_base: /data/protomaps/base.pmtiles
    # protomaps_bg: file not yet synced — style layers earth/landcover-bg/water-bg will 404

    overture_base: /data/overture/base_clean.pmtiles
    overture_buildings: /data/overture/buildings_composite.pmtiles

    # ── Terrain ────────────────────────────────────────────────────────────
    # Raster-DEM source for the hillshade layer.
    # ArcGIS Pro will not render it as a DEM but tiles will serve correctly.
    dem: /data/mapterhorn/terrain.pmtiles
    # contours: file not yet synced — contours/contours-label layers will 404

    # ── GRID3 — COD (Democratic Republic of Congo) ────────────────────────
    grid3_cod: /data/grid3/GRID3_COD.pmtiles

    # ── GRID3 — NGA (Nigeria) ─────────────────────────────────────────────
    grid3_nga: /data/grid3/GRID3_NGA.pmtiles
    # grid3_nga_roads: file not yet synced — grid3-nga-roads-minor layer will 404
