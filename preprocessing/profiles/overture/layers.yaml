# ── Settlement extents ────────────────────────────────────────────────────────
  GRID3_NGA_settlement_extents:
    output_stem: GRID3_NGA_settlement_extents
    profile: settlement_extents
    name: "GRID3 Nigeria Settlement Extents v4.0"
    description: "Settlement extents and blocks for Nigeria."
    attribution: "© The Trustees of Columbia University in the City of New York. CC BY-SA 4.0."
    version: "4.0"
    published: "2024-06-01"
    doi: "https://doi.org/10.7916/fr96-f546"

    # Adjacent blocks share exact borders within MGRS grid cells — sync shared nodes.
    polygon_settings:
      - "--no-simplification-of-shared-nodes"

    polygon_layers:
      # Dissolve (z7–13): zoom-stepped by settlement type to prevent density dropout
      - file: GRID3_NGA_settlement_extents_dissolve_v4_0.fgb
        layer: GRID3-NGA-settlement-extents-v4-0
        minzoom: 7
        maxzoom: 13
        modifier: settlement_extents_extent_type

      # Blocks (z13–16): fine-grained settlement footprints
      - file: GRID3_NGA_settlement_extents_v4_0.fgb
        layer: GRID3-NGA-settlement-blocks-v4-0
        minzoom: 13
        maxzoom: 16

# ── Roads ─────────────────────────────────────────────────────────────────────
  GRID3_NGA_roads:
    output_stem: GRID3_NGA_roads
    profile: roads
    name: "GRID3 Nigeria Roads v1.0"
    description: "GRID3 linear road features for Nigeria."
    attribution: "© The Trustees of Columbia University in the City of New York. CC BY 4.0."
    version: "1.0"
    published: "2024-01-01"
    doi: "https://doi.org/10.7916/b42r-6w17"

    line_layers:
      - file: GRID3_NGA_roads_v1_0_4326.fgb
        layer: GRID3-NGA-roads-v1-0
        minzoom: 5
        maxzoom: 15
        modifier: roads

