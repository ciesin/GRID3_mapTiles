# ── POIs ──────────────────────────────────────────────────────────────────────
  GRID3_COD_POIs:
    output_stem: GRID3_COD_POIs
    profile: POI
    name: "GRID3 DRC Points of Interest v8.0"
    description: >-
      Health facilities and settlement names (v8.0) for the Democratic Republic of the Congo.
      Ituri Province features merged from supplementary dataset (June 2026).
    attribution: "© The Trustees of Columbia University in the City of New York. CC BY-SA 4.0."
    version: "8.0"
    published: "2026-01-13"
    doi: "https://doi.org/10.7916/f1ft-y872"

    point_layers:
      - file: GRID3_COD_health_facilities_v8_0.fgb
        layer: GRID3-COD-health-facilities-v8-0
        minzoom: 5
        maxzoom: 16
        modifier: health_facilities_esstype     # zoom-stepped by facility type (esstype)
      - file: GRID3_COD_settlement_names_v8_0.fgb
        layer: GRID3-COD-settlement-names-v8-0
        minzoom: 5
        maxzoom: 16
