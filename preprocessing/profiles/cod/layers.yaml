iso3: cod

# ── Boundaries ────────────────────────────────────────────────────────────────
groups:
  GRID3_COD_boundaries:
    output_stem: GRID3_COD_boundaries
    profile: boundaries
    name: "GRID3 DRC Administrative Boundaries v8.0"
    description: >-
      Province, antenne, health zone, and health area operational boundaries
      for the Democratic Republic of the Congo. Ituri Province features merged
      from supplementary dataset (June 2026).
    attribution: "© The Trustees of Columbia University in the City of New York. CC BY-SA 4.0."
    version: "8.0"
    published: "2026-01-13"
    doi: "https://doi.org/10.7916/kcq9-7s03"

    # All polygon admin levels in one tippecanoe call so
    # --no-simplification-of-shared-nodes sees shared border nodes across levels.
    polygon_layers:
      - file: GRID3_COD_province_v8_0.fgb
        layer: GRID3-COD-province-v8-0
        minzoom: 3
        maxzoom: 14
      - file: GRID3_COD_antenne_v8_0.fgb
        layer: GRID3-COD-antenne-v8-0
        minzoom: 3
        maxzoom: 14
      - file: GRID3_COD_zonesante_v8_0.fgb
        layer: GRID3-COD-zonesante-v8-0
        minzoom: 5
        maxzoom: 14
      - file: GRID3_COD_airesante_v8_0.fgb
        layer: GRID3-COD-airesante-v8-0
        minzoom: 7
        maxzoom: 14

    point_layers:
      - file: GRID3_COD_province_v8_0_centroids.fgb
        layer: GRID3-COD-province-v8-0-centroids
        minzoom: 3
        maxzoom: 14
      - file: GRID3_COD_antenne_v8_0_centroids.fgb
        layer: GRID3-COD-antenne-v8-0-centroids
        minzoom: 3
        maxzoom: 14
      - file: GRID3_COD_zonesante_v8_0_centroids.fgb
        layer: GRID3-COD-zonesante-v8-0-centroids
        minzoom: 5
        maxzoom: 14
      - file: GRID3_COD_airesante_v8_0_centroids.fgb
        layer: GRID3-COD-airesante-v8-0-centroids
        minzoom: 7
        maxzoom: 14

# ── Settlement extents ────────────────────────────────────────────────────────
  GRID3_COD_settlement_extents:
    output_stem: GRID3_COD_settlement_extents
    profile: settlement_extents
    name: "GRID3 DRC Settlement Extents v3.1"
    description: "Settlement extent polygons for the Democratic Republic of the Congo."
    attribution: "© The Trustees of Columbia University in the City of New York. CC BY-SA 4.0."
    version: "3.1"
    published: "2024-07-16"
    doi: "https://doi.org/10.7916/d6gy-yh28"

    polygon_layers:
      - file: GRID3_COD_settlement_extents_v3_1.fgb
        layer: GRID3-COD-settlement-extents-v3-1
        minzoom: 7
        maxzoom: 14
        modifier: settlement_extents_type    # zoom-stepped by settlement type

